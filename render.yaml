services:
  - type: web
    name: attendance-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: attendance_portal
      - key: CORS_ORIGINS
        value: https://attendance-frontend-kmtk.onrender.com,http://localhost:5173
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.12.8
  - type: web
    name: attendance-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && NITRO_PRESET=node-server npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_BASE
        value: https://attendance-api-kmtk.onrender.com
      - key: NODE_VERSION
        value: 20
